# 自动同步上游仓库：ZhuLinsen/daily_stock_analysis
name: 自动同步上游仓库

# 同步规则：每天北京时间 8:30 自动同步 + 支持手动触发
on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: tgymnich/fork-sync@v1.8
        with:
          # 原仓库信息（已为你配置好）
          owner: ZhuLinsen
          upstream: daily_stock_analysis
          # 同步分支（默认主分支）
          head: main
          base: main
          # 合并方式：正常合并，不丢失你的修改
          merge_method: merge
          token: ${{ secrets.GITHUB_TOKEN }}
